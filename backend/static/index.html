<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>podcast2go</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#a9d877" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: {
        ink:'#141111', canvas:'#fffaef', warm1:'#fff8e6', warm2:'#fffdf7', mute:'#576574',
        acc:'#a9d877', accD:'#8fc659', pink:'#fe7da8', cyan:'#27ccf3', lav:'#bbafe6', orange:'#f8a16f', lime:'#a9d877'
      },
      fontFamily: {
        display:['"Space Grotesk"','system-ui','sans-serif'],
        mono:['"Space Mono"','ui-monospace','monospace'],
        body:['ui-sans-serif','system-ui','sans-serif']
      },
      boxShadow: {
        bxs:'1px 1px 0 #141111', bsm:'2px 2px 0 #141111', bmd:'4px 4px 0 #141111', blg:'6px 6px 0 #141111'
      }
    } } };
  </script>
  <style>
    *,*::before,*::after{ box-sizing:border-box; margin:0; border-radius:0 }
    body{ background:#fffaef; color:#141111; -webkit-tap-highlight-color:transparent;
          -webkit-font-smoothing:antialiased; line-height:1.5 }
    ::selection{ background:#a9d877; color:#141111 }
    ::-webkit-scrollbar{ width:10px; height:10px }
    ::-webkit-scrollbar-track{ background:#fffaef }
    ::-webkit-scrollbar-thumb{ background:#141111 }
    :focus-visible{ outline:2px solid #141111; outline-offset:2px }
    a{ color:#141111; text-underline-offset:2px }
    summary{ list-style:none; cursor:pointer }
    summary::-webkit-details-marker{ display:none }
    @media (prefers-reduced-motion: reduce){ *,*::before,*::after{ animation:none!important; transition:none!important } }
    @keyframes float{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

    /* ---- raft component primitives ---- */
    .card{ background:#fffdf7; border:2px solid #141111; box-shadow:2px 2px 0 #141111 }
    .label{ display:block; font-family:"Space Mono",monospace; font-size:10px; font-weight:700;
            letter-spacing:.08em; text-transform:uppercase; color:#141111; margin-bottom:6px }
    .input{ width:100%; background:#fff; border:2px solid #141111; padding:10px 12px;
            font-size:14px; font-family:inherit; color:#141111 }
    .input::placeholder{ color:#576574 }
    .input:focus{ outline:2px solid #141111; outline-offset:2px }
    .summary{ font-family:"Space Grotesk",sans-serif; font-weight:600; font-size:14px; user-select:none }
    .btn{ font-family:"Space Grotesk",sans-serif; font-weight:700; font-size:14px; border:2px solid #141111;
          box-shadow:2px 2px 0 #141111; background:#fff; color:#141111; cursor:pointer;
          transition:transform .1s cubic-bezier(.4,0,.2,1),box-shadow .1s cubic-bezier(.4,0,.2,1) }
    .btn:hover{ transform:translate(2px,2px); box-shadow:1px 1px 0 #141111 }
    .btn:active{ transform:translate(2px,2px); box-shadow:none }
    .btn:disabled{ opacity:.5; box-shadow:none; cursor:not-allowed; transform:none }
    .btn-primary{ background:#a9d877 }
    .m-btn{ font-family:"Space Mono",monospace; font-weight:700; font-size:14px; border:2px solid #141111;
            box-shadow:2px 2px 0 #141111; background:#fff; color:#141111; padding:10px 0; cursor:pointer;
            transition:transform .1s cubic-bezier(.4,0,.2,1),box-shadow .1s cubic-bezier(.4,0,.2,1) }
    .m-btn:hover{ transform:translate(2px,2px); box-shadow:1px 1px 0 #141111 }
    .m-btn.active{ background:#a9d877 }
    .lang-btn{ font-family:"Space Mono",monospace; font-weight:700; font-size:12px; padding:6px 12px;
               background:#fff; color:#141111; cursor:pointer }
    .lang-btn + .lang-btn{ border-left:2px solid #141111 }
    .lang-btn.active{ background:#a9d877 }
    .mark{ width:42px; height:42px; flex:0 0 42px; background:#a9d877; border:2px solid #141111;
           box-shadow:2px 2px 0 #141111; display:inline-flex; align-items:center; justify-content:center }
    .errbox{ background:#fe7da8; border:2px solid #141111; box-shadow:2px 2px 0 #141111;
             padding:8px 12px; font-size:14px; font-weight:600 }
    .mono-link{ font-family:"Space Mono",monospace; font-size:12px; text-transform:uppercase;
                letter-spacing:.06em; text-decoration:underline; color:#141111; cursor:pointer; background:none; border:none }
    .hero-art{ width:88px; height:88px; flex:0 0 88px; background:#a9d877; border:2px solid #141111;
               box-shadow:4px 4px 0 #141111; display:flex; align-items:center; justify-content:center;
               animation:float 5s cubic-bezier(.4,0,.2,1) infinite }
    audio{ width:100%; border:2px solid #141111; box-shadow:2px 2px 0 #141111 }
  </style>
</head>
<body class="min-h-screen font-body">
<div class="max-w-md mx-auto px-5 pt-7 pb-28">

  <header class="mb-6 flex items-center justify-between gap-3">
    <div class="flex items-center gap-3 min-w-0">
      <span class="mark" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#141111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 13v-2a8 8 0 0 1 16 0v2"/><rect x="3" y="12" width="4" height="6"/><rect x="17" y="12" width="4" height="6"/>
        </svg>
      </span>
      <div class="min-w-0">
        <h1 class="font-display text-2xl font-bold tracking-tight leading-none">podcast2go</h1>
        <p class="text-xs text-mute mt-1.5 truncate" data-i18n="tagline"></p>
      </div>
    </div>
    <div id="langtoggle" class="flex border-2 border-ink shadow-bsm shrink-0">
      <button data-lang="en" class="lang-btn">EN</button>
      <button data-lang="zh" class="lang-btn">中文</button>
    </div>
  </header>

  <!-- ===== BYOK SETTINGS (LLM endpoint) ===== -->
  <details id="settings" class="mb-5 card p-4">
    <summary class="summary" data-i18n="settings_summary"></summary>
    <div class="mt-4 space-y-3">
      <div>
        <label class="label" data-i18n="llm_base_label"></label>
        <input id="s_llm_base" class="input" data-ph="llm_base_ph" />
      </div>
      <div>
        <label class="label" data-i18n="llm_key_label"></label>
        <input id="s_llm_key" type="password" class="input" data-ph="llm_key_ph" />
      </div>
      <div>
        <label class="label" data-i18n="llm_model_label"></label>
        <input id="s_llm_model" class="input" placeholder="gpt-4o-mini" />
      </div>
      <p class="text-xs text-mute" data-i18n="settings_note"></p>
    </div>
  </details>

  <!-- ===== 1. INPUT ===== -->
  <section id="screen-input">
    <label class="label" data-i18n="url_label"></label>
    <input id="url" type="url" inputmode="url" placeholder="https://…" class="input" />

    <label class="label mt-6" data-i18n="duration_label"></label>
    <div id="minutes" class="grid grid-cols-4 gap-2">
      <button data-m="3" class="m-btn"></button>
      <button data-m="5" class="m-btn"></button>
      <button data-m="10" class="m-btn"></button>
      <button data-m="15" class="m-btn"></button>
    </div>

    <details class="mt-5 card p-4">
      <summary class="summary text-mute" data-i18n="advanced"></summary>
      <div class="mt-4 space-y-3">
        <div>
          <label class="label" data-i18n="focus_label"></label>
          <input id="focus" class="input" data-ph="focus_ph" />
        </div>
        <div>
          <label class="label" data-i18n="deep_label"></label>
          <input id="deep" class="input" data-ph="deep_ph" />
        </div>
        <div>
          <label class="label" data-i18n="prefs_label"></label>
          <input id="prefs" class="input" data-ph="prefs_ph" />
        </div>
        <div>
          <label class="label" data-i18n="outlang_label"></label>
          <select id="lang" class="input">
            <option>English</option><option>中文</option><option>Japanese</option>
            <option>French</option><option>German</option>
            <option>Spanish</option><option>Portuguese</option>
          </select>
        </div>
      </div>
    </details>

    <button id="go" class="btn btn-primary w-full mt-7 py-3.5" data-i18n="go"></button>
    <p id="input-err" class="errbox mt-4 hidden"></p>
  </section>

  <!-- ===== 2. PROGRESS ===== -->
  <section id="screen-progress" class="hidden">
    <h2 class="font-display text-xl font-bold mb-5" data-i18n="progress_title"></h2>
    <ul id="steps" class="space-y-3"></ul>
    <p id="prog-err" class="errbox mt-4 hidden"></p>
    <button onclick="reset()" class="mono-link mt-6 inline-block" data-i18n="cancel"></button>
  </section>

  <!-- ===== 3. PLAYER ===== -->
  <section id="screen-player" class="hidden">
    <div class="flex items-start gap-4 mb-5">
      <div class="hero-art" aria-hidden="true">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#141111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 13v-2a8 8 0 0 1 16 0v2"/><rect x="3" y="12" width="4" height="6"/><rect x="17" y="12" width="4" height="6"/>
        </svg>
      </div>
      <div class="min-w-0 pt-1">
        <span class="inline-flex border-2 border-ink shadow-bxs bg-acc px-2 py-0.5 font-mono text-[10px] font-bold uppercase tracking-wider">Podcast</span>
        <h2 id="p-title" class="font-display text-lg font-bold leading-snug mt-2 break-words"></h2>
        <p id="p-meta" class="font-mono text-xs text-mute mt-1"></p>
      </div>
    </div>

    <audio id="audio" controls preload="auto" class="mb-5"></audio>

    <div id="chapters" class="mb-6"></div>

    <h3 class="font-display text-base font-bold mb-3" data-i18n="points_h"></h3>
    <div id="points" class="mb-6"></div>

    <h3 class="font-display text-base font-bold mb-3" data-i18n="sources_h"></h3>
    <div id="sources" class="mb-6"></div>

    <details class="mb-6 card p-4">
      <summary class="summary text-mute" data-i18n="script_summary"></summary>
      <p id="script" class="text-sm text-mute mt-3 whitespace-pre-wrap leading-relaxed"></p>
    </details>

    <div class="flex gap-3">
      <a id="download" download class="btn flex-1 text-center py-3" data-i18n="download"></a>
      <button onclick="reset()" class="btn btn-primary flex-1 py-3" data-i18n="again"></button>
    </div>
  </section>
</div>

<script>
  // ===================== i18n =====================
  const T = {
    en: {
      tagline: "Long content → a time-boxed key-point digest, listen on the go",
      settings_summary: "LLM endpoint · BYOK (stored locally) ▾",
      llm_base_label: "LLM Base URL",
      llm_base_ph: "https://api.openai.com/v1 (or any OpenAI-compatible endpoint)",
      llm_key_label: "LLM API Key",
      llm_key_ph: "sk-… (use 'ollama' for local Ollama)",
      llm_model_label: "LLM Model",
      settings_note: "Any OpenAI-compatible endpoint (OpenAI, Groq, Together, OpenRouter, Nebius, local Ollama…). Blank fields fall back to the server .env. Keys live only in this browser and are sent with each request.",
      url_label: "Link (article / YouTube)",
      duration_label: "Target length",
      unit: "min",
      advanced: "Advanced ▾",
      focus_label: "Key topics (what to focus on)",
      focus_ph: "e.g. business model, team",
      deep_label: "Deep-dive topics (comma-separated)",
      deep_ph: "e.g. regulatory risk",
      prefs_label: "Preference (tone / angle)",
      prefs_ph: "e.g. beginner-friendly, conclusions only",
      outlang_label: "Output language (depends on TTS engine; default edge supports Chinese)",
      go: "Generate podcast",
      err_url: "Please enter a valid link",
      err_req: "Request failed: ",
      progress_title: "Generating…",
      cancel: "Cancel / start over",
      err_done: "Generation failed: ",
      err_conn: "Connection lost",
      steps: { ingest:"Parse & transcribe", extract:"Extract key points", research:"Deep search", script:"Write script", tts:"Synthesize voice" },
      st: { done:"Done", running:"Running", pending:"Waiting" },
      points_h: "Key points",
      sources_h: "Sources & deep dive",
      none: "None",
      script_summary: "View full script ▾",
      download: "Download audio",
      again: "Make another",
      meta: (d) => `${Math.round(d.duration)}s actual · ${d.target_minutes} min target`,
    },
    zh: {
      tagline: "长内容 → 时长可控的重点播客，边走边听",
      settings_summary: "LLM 端点 · BYOK（仅存本地浏览器） ▾",
      llm_base_label: "LLM Base URL",
      llm_base_ph: "https://api.openai.com/v1（任意 OpenAI 兼容端点）",
      llm_key_label: "LLM API Key",
      llm_key_ph: "sk-…（本地 Ollama 可填 ollama）",
      llm_model_label: "LLM Model",
      settings_note: "任意 OpenAI 兼容端点（OpenAI / Groq / Together / OpenRouter / Nebius / 本地 Ollama 等）。留空则用服务器 .env 默认值；Key 仅存于本浏览器，随请求发送。",
      url_label: "链接（文章 / YouTube）",
      duration_label: "目标时长",
      unit: "分",
      advanced: "高级选项 ▾",
      focus_label: "核心点（聚焦哪些主题）",
      focus_ph: "例: 商业模式, 团队管理",
      deep_label: "深度了解的点（逗号分隔）",
      deep_ph: "例: 监管风险",
      prefs_label: "偏好（语气 / 视角）",
      prefs_ph: "例: 对初学者友好，只讲结论",
      outlang_label: "输出语言（取决于 TTS 引擎；默认 edge 支持中文）",
      go: "生成播客",
      err_url: "请输入有效链接",
      err_req: "请求失败: ",
      progress_title: "正在生成…",
      cancel: "取消 / 重新开始",
      err_done: "生成失败: ",
      err_conn: "连接中断",
      steps: { ingest:"解析来源 & 转写", extract:"提取核心重点", research:"深度搜索", script:"撰写播客脚本", tts:"语音合成" },
      st: { done:"完成", running:"进行中", pending:"等待" },
      points_h: "核心重点",
      sources_h: "来源 & 深度补充",
      none: "无",
      script_summary: "查看完整脚本 ▾",
      download: "下载音频",
      again: "再来一个",
      meta: (d) => `实际 ${Math.round(d.duration)} 秒 · 目标 ${d.target_minutes} 分钟`,
    },
  };
  let lang = localStorage.getItem('p2g_lang') || ((navigator.language || '').toLowerCase().startsWith('zh') ? 'zh' : 'en');
  if (!T[lang]) lang = 'en';
  let L = T[lang];

  const $ = id => document.getElementById(id);

  function applyLang(next) {
    lang = T[next] ? next : 'en'; L = T[lang]; localStorage.setItem('p2g_lang', lang);
    document.documentElement.lang = lang === 'zh' ? 'zh' : 'en';
    document.querySelectorAll('[data-i18n]').forEach(el => { const v = L[el.dataset.i18n]; if (typeof v === 'string') el.textContent = v; });
    document.querySelectorAll('[data-ph]').forEach(el => { const v = L[el.dataset.ph]; if (typeof v === 'string') el.placeholder = v; });
    document.querySelectorAll('.m-btn').forEach(b => b.textContent = `${b.dataset.m} ${L.unit}`);
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  }
  document.querySelectorAll('.lang-btn').forEach(b => b.onclick = () => applyLang(b.dataset.lang));

  // ===================== minute selector =====================
  let minutes = 5;
  function paintMinutes(){ document.querySelectorAll('.m-btn').forEach(b =>
    b.classList.toggle('active', +b.dataset.m === minutes)); }
  document.querySelectorAll('.m-btn').forEach(b => b.onclick = () => { minutes = +b.dataset.m; paintMinutes(); });

  // ===================== BYOK settings =====================
  const SET_FIELDS = {
    s_llm_base:'llm_base_url', s_llm_key:'llm_api_key', s_llm_model:'llm_model',
  };
  function saveSettings(){
    const data = {}; Object.keys(SET_FIELDS).forEach(id => data[id] = $(id).value);
    localStorage.setItem('p2g_settings', JSON.stringify(data));
  }
  function loadSettings(){
    let data = {}; try { data = JSON.parse(localStorage.getItem('p2g_settings')||'{}'); } catch(e){}
    Object.keys(SET_FIELDS).forEach(id => { if (data[id] != null) $(id).value = data[id]; });
  }
  Object.keys(SET_FIELDS).forEach(id => $(id).addEventListener('change', saveSettings));
  function settingsPayload(){
    const p = {}; Object.entries(SET_FIELDS).forEach(([id,key]) => { const v=$(id).value.trim(); if (v) p[key]=v; });
    return p;
  }

  // ===================== screens =====================
  function show(name){ ['input','progress','player'].forEach(s =>
    $('screen-'+s).classList.toggle('hidden', s !== name)); }
  function reset(){ if (window._es) window._es.close(); $('audio').pause(); show('input'); }

  function renderSteps(states){
    const M = { done:['bg-acc','✓'], running:['bg-cyan animate-pulse','◌'], pending:['bg-white','○'] };
    $('steps').innerHTML = Object.keys(L.steps).map(k => {
      const st = states[k] || {status:'pending'};
      const status = M[st.status] ? st.status : 'pending';
      const m = M[status];
      const txt = status==='pending' ? 'text-mute' : 'text-ink';
      const badge = `<span class="shrink-0 inline-flex items-center border-2 border-ink shadow-bxs ${m[0]} px-1.5 py-0.5 font-mono text-[10px] font-bold uppercase tracking-wider leading-none">${L.st[status]}</span>`;
      return `<li class="flex items-start gap-3">
        <span class="step-dot inline-flex items-center justify-center w-6 h-6 shrink-0 border-2 border-ink shadow-bxs font-mono text-xs ${m[0]}">${m[1]}</span>
        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-2">
            <span class="text-sm font-semibold ${txt}">${L.steps[k]}</span>
            ${badge}
          </div>
        ${st.detail?`<div class="font-mono text-[11px] text-mute mt-0.5">${st.detail}</div>`:''}</div></li>`;
    }).join('');
  }

  $('go').onclick = async () => {
    const url = $('url').value.trim();
    $('input-err').classList.add('hidden');
    if (!/^https?:\/\//.test(url)) { $('input-err').textContent=L.err_url; $('input-err').classList.remove('hidden'); return; }
    const body = { url, minutes, focus:$('focus').value, deep_topics:$('deep').value, prefs:$('prefs').value, language:$('lang').value, ...settingsPayload() };
    let res;
    try { res = await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json()); }
    catch(e){ $('input-err').textContent=L.err_req+e; $('input-err').classList.remove('hidden'); return; }

    const states = {}; renderSteps(states); show('progress'); $('prog-err').classList.add('hidden');
    const es = new EventSource('/api/events/'+res.job_id); window._es = es;
    es.onmessage = async (m) => {
      const ev = JSON.parse(m.data);
      if (ev.step === '__done__'){
        es.close();
        if (ev.status === 'error'){ $('prog-err').textContent = L.err_done+ev.detail; $('prog-err').classList.remove('hidden'); return; }
        const data = await fetch('/api/result/'+res.job_id).then(r=>r.json());
        renderPlayer(data);
        return;
      }
      states[ev.step] = {status:ev.status, detail:ev.detail};
      renderSteps(states);
    };
    es.onerror = () => { $('prog-err').textContent=L.err_conn; $('prog-err').classList.remove('hidden'); };
  };

  function renderPlayer(d){
    $('p-title').textContent = d.title;
    $('p-meta').textContent = L.meta(d);
    const audio = $('audio'); audio.src = d.audio_url;
    $('download').href = d.audio_url;

    $('chapters').innerHTML = (d.chapters||[]).map(c =>
      `<button class="w-full text-left text-sm px-3 py-2.5 border-2 border-ink bg-warm2 shadow-bxs mb-2 hover:bg-warm1 transition" onclick="document.getElementById('audio').currentTime=${c.start};document.getElementById('audio').play()">
        <span class="font-mono text-[11px] font-bold bg-acc border-2 border-ink px-1.5 py-0.5 mr-2">${fmt(c.start)}</span>${c.title}</button>`).join('');

    $('points').innerHTML = (d.key_points||[]).map(p =>
      `<div class="border-2 border-ink bg-warm2 shadow-bxs px-3 py-2.5 text-sm mb-2">
        <span class="inline-block w-2 h-2 bg-acc border border-ink mr-2 align-middle"></span>${p.point}
        ${p.detail?`<div class="font-mono text-[11px] text-mute mt-1">${p.detail}</div>`:''}</div>`).join('');

    const srcRows = [];
    (d.research||[]).forEach(r => (r.sources||[]).forEach(s =>
      srcRows.push(`<a href="${s.url}" target="_blank" class="block text-sm border-2 border-ink bg-warm2 shadow-bxs px-3 py-2 mb-2 truncate hover:bg-warm1 transition">${s.title||s.url}</a>`)));
    $('sources').innerHTML = srcRows.length ? srcRows.join('') : `<p class="font-mono text-xs text-mute">${L.none}</p>`;

    $('script').textContent = d.script;

    setupMediaSession(d, audio);
    show('player');
  }

  function fmt(s){ s=Math.round(s); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

  // ---- background playback: Media Session API (lock screen / control center) ----
  function setupMediaSession(d, audio){
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({ title: d.title, artist: 'podcast2go', album: 'podcast2go' });
    navigator.mediaSession.setActionHandler('play', () => audio.play());
    navigator.mediaSession.setActionHandler('pause', () => audio.pause());
    navigator.mediaSession.setActionHandler('seekbackward', () => audio.currentTime = Math.max(0, audio.currentTime - 15));
    navigator.mediaSession.setActionHandler('seekforward', () => audio.currentTime = Math.min(audio.duration, audio.currentTime + 15));
  }

  // ===================== init =====================
  loadSettings();
  applyLang(lang);
  paintMinutes();
</script>
</body>
</html>
