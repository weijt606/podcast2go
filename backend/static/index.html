<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>podcast2go</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#121212" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: {
      base:'#121212', surf:'#181818', surf2:'#282828', field:'#3e3e3e',
      sgreen:'#1DB954', sgreenL:'#1ED760', muted:'#b3b3b3'
    }, fontFamily: { sans:['Circular','Helvetica Neue','Arial','sans-serif'] } } } };
  </script>
  <style>
    body { background:#121212; color:#fff; -webkit-tap-highlight-color:transparent; }
    .step-dot { transition: all .3s; }
    .hero { background:linear-gradient(180deg,#1f1f1f 0%,#121212 100%); }
  </style>
</head>
<body class="min-h-screen font-sans">
<div class="max-w-md mx-auto px-5 pt-7 pb-28">

  <header class="mb-6 flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-extrabold tracking-tight">🎧 podcast2go</h1>
      <p class="text-sm text-muted mt-1" data-i18n="tagline"></p>
    </div>
    <div id="langtoggle" class="flex rounded-full overflow-hidden bg-surf2 text-xs font-bold shrink-0">
      <button data-lang="en" class="lang-btn px-3 py-1.5 rounded-full">EN</button>
      <button data-lang="zh" class="lang-btn px-3 py-1.5 rounded-full">中文</button>
    </div>
  </header>

  <!-- ===== BYOK SETTINGS (LLM endpoint) ===== -->
  <details id="settings" class="mb-5 rounded-xl bg-surf p-4">
    <summary class="text-sm font-semibold cursor-pointer select-none" data-i18n="settings_summary"></summary>
    <div class="mt-3 space-y-3">
      <div>
        <label class="setlbl" data-i18n="llm_base_label"></label>
        <input id="s_llm_base" class="adv-input" data-ph="llm_base_ph" />
      </div>
      <div>
        <label class="setlbl" data-i18n="llm_key_label"></label>
        <input id="s_llm_key" type="password" class="adv-input" data-ph="llm_key_ph" />
      </div>
      <div>
        <label class="setlbl" data-i18n="llm_model_label"></label>
        <input id="s_llm_model" class="adv-input" placeholder="gpt-4o-mini" />
      </div>
      <p class="text-xs text-muted" data-i18n="settings_note"></p>
    </div>
  </details>

  <!-- ===== 1. INPUT ===== -->
  <section id="screen-input">
    <label class="block text-sm font-semibold mb-2" data-i18n="url_label"></label>
    <input id="url" type="url" inputmode="url" placeholder="https://…"
      class="w-full rounded-lg bg-field/60 px-4 py-3 text-sm placeholder-muted focus:outline-none focus:ring-2 focus:ring-white" />

    <label class="block text-sm font-semibold mt-6 mb-2" data-i18n="duration_label"></label>
    <div id="minutes" class="grid grid-cols-4 gap-2">
      <button data-m="3" class="m-btn"></button>
      <button data-m="5" class="m-btn"></button>
      <button data-m="10" class="m-btn"></button>
      <button data-m="15" class="m-btn"></button>
    </div>

    <details class="mt-5 group">
      <summary class="text-sm font-semibold text-muted cursor-pointer select-none" data-i18n="advanced"></summary>
      <div class="mt-3 space-y-3">
        <div>
          <label class="setlbl" data-i18n="focus_label"></label>
          <input id="focus" class="adv-input" data-ph="focus_ph" />
        </div>
        <div>
          <label class="setlbl" data-i18n="deep_label"></label>
          <input id="deep" class="adv-input" data-ph="deep_ph" />
        </div>
        <div>
          <label class="setlbl" data-i18n="prefs_label"></label>
          <input id="prefs" class="adv-input" data-ph="prefs_ph" />
        </div>
        <div>
          <label class="setlbl" data-i18n="outlang_label"></label>
          <select id="lang" class="adv-input">
            <option>English</option><option>中文</option><option>Japanese</option>
            <option>French</option><option>German</option>
            <option>Spanish</option><option>Portuguese</option>
          </select>
        </div>
      </div>
    </details>

    <button id="go" class="mt-7 w-full rounded-full bg-sgreen text-black py-3.5 font-bold hover:bg-sgreenL hover:scale-[1.02] active:scale-100 transition disabled:opacity-40" data-i18n="go"></button>
    <p id="input-err" class="text-rose-400 text-sm mt-3 hidden"></p>
  </section>

  <!-- ===== 2. PROGRESS ===== -->
  <section id="screen-progress" class="hidden">
    <h2 class="text-xl font-extrabold mb-5" data-i18n="progress_title"></h2>
    <ul id="steps" class="space-y-3"></ul>
    <p id="prog-err" class="text-rose-400 text-sm mt-4 hidden"></p>
    <button onclick="reset()" class="mt-6 text-sm text-muted underline" data-i18n="cancel"></button>
  </section>

  <!-- ===== 3. PLAYER ===== -->
  <section id="screen-player" class="hidden">
    <div class="hero -mx-5 px-5 pt-2 pb-6 mb-5 rounded-b-2xl">
      <div class="w-full aspect-square max-w-[200px] mx-auto rounded-xl bg-gradient-to-br from-sgreen to-emerald-800 flex items-center justify-center text-6xl shadow-2xl mb-4">🎧</div>
      <h2 id="p-title" class="text-xl font-extrabold leading-snug"></h2>
      <p id="p-meta" class="text-xs text-muted mt-1"></p>
    </div>

    <audio id="audio" controls preload="auto" class="w-full mb-5"></audio>

    <div id="chapters" class="space-y-1 mb-6"></div>

    <h3 class="text-base font-bold mb-3" data-i18n="points_h"></h3>
    <div id="points" class="space-y-2 mb-6"></div>

    <h3 class="text-base font-bold mb-3" data-i18n="sources_h"></h3>
    <div id="sources" class="space-y-2 mb-6"></div>

    <details class="mb-6">
      <summary class="text-sm font-semibold text-muted cursor-pointer" data-i18n="script_summary"></summary>
      <p id="script" class="text-sm text-muted mt-2 whitespace-pre-wrap leading-relaxed"></p>
    </details>

    <div class="flex gap-3">
      <a id="download" download class="flex-1 text-center rounded-full bg-surf2 hover:bg-field py-3 text-sm font-semibold transition" data-i18n="download"></a>
      <button onclick="reset()" class="flex-1 rounded-full bg-sgreen text-black py-3 text-sm font-bold hover:bg-sgreenL transition" data-i18n="again"></button>
    </div>
  </section>
</div>

<script>
  // ===================== i18n =====================
  const T = {
    en: {
      tagline: "Long content → a time-boxed key-point digest, listen on the go",
      settings_summary: "⚙️ LLM endpoint · BYOK (stored locally)",
      llm_base_label: "LLM Base URL",
      llm_base_ph: "https://api.openai.com/v1 (or any OpenAI-compatible endpoint)",
      llm_key_label: "LLM API Key",
      llm_key_ph: "sk-… (use 'ollama' for local Ollama)",
      llm_model_label: "LLM Model",
      settings_note: "Any OpenAI-compatible endpoint (OpenAI, Groq, Together, OpenRouter, Nebius, local Ollama…). Blank fields fall back to the server .env. Keys live only in this browser and are sent with each request.",
      url_label: "Link (article / YouTube)",
      duration_label: "Target length",
      unit: "min",
      advanced: "Advanced ▾",
      focus_label: "Key topics (what to focus on)",
      focus_ph: "e.g. business model, team",
      deep_label: "Deep-dive topics (comma-separated)",
      deep_ph: "e.g. regulatory risk",
      prefs_label: "Preference (tone / angle)",
      prefs_ph: "e.g. beginner-friendly, conclusions only",
      outlang_label: "Output language (depends on TTS engine; default edge supports Chinese)",
      go: "Generate podcast",
      err_url: "Please enter a valid link",
      err_req: "Request failed: ",
      progress_title: "Generating…",
      cancel: "Cancel / start over",
      err_done: "Generation failed: ",
      err_conn: "Connection lost",
      steps: { ingest:"Parse & transcribe", extract:"Extract key points", research:"Deep search", script:"Write script", tts:"Synthesize voice" },
      points_h: "Key points",
      sources_h: "Sources & deep dive",
      none: "None",
      script_summary: "View full script ▾",
      download: "Download audio",
      again: "Make another",
      meta: (d) => `${Math.round(d.duration)}s actual · ${d.target_minutes} min target`,
    },
    zh: {
      tagline: "长内容 → 时长可控的重点播客，边走边听",
      settings_summary: "⚙️ LLM 端点 · BYOK（仅存本地浏览器）",
      llm_base_label: "LLM Base URL",
      llm_base_ph: "https://api.openai.com/v1（任意 OpenAI 兼容端点）",
      llm_key_label: "LLM API Key",
      llm_key_ph: "sk-…（本地 Ollama 可填 ollama）",
      llm_model_label: "LLM Model",
      settings_note: "任意 OpenAI 兼容端点（OpenAI / Groq / Together / OpenRouter / Nebius / 本地 Ollama 等）。留空则用服务器 .env 默认值；Key 仅存于本浏览器，随请求发送。",
      url_label: "链接（文章 / YouTube）",
      duration_label: "目标时长",
      unit: "分",
      advanced: "高级选项 ▾",
      focus_label: "核心点（聚焦哪些主题）",
      focus_ph: "例: 商业模式, 团队管理",
      deep_label: "深度了解的点（逗号分隔）",
      deep_ph: "例: 监管风险",
      prefs_label: "偏好（语气 / 视角）",
      prefs_ph: "例: 对初学者友好，只讲结论",
      outlang_label: "输出语言（取决于 TTS 引擎；默认 edge 支持中文）",
      go: "生成播客",
      err_url: "请输入有效链接",
      err_req: "请求失败: ",
      progress_title: "正在生成…",
      cancel: "取消 / 重新开始",
      err_done: "生成失败: ",
      err_conn: "连接中断",
      steps: { ingest:"解析来源 & 转写", extract:"提取核心重点", research:"深度搜索", script:"撰写播客脚本", tts:"语音合成" },
      points_h: "核心重点",
      sources_h: "来源 & 深度补充",
      none: "无",
      script_summary: "查看完整脚本 ▾",
      download: "下载音频",
      again: "再来一个",
      meta: (d) => `实际 ${Math.round(d.duration)} 秒 · 目标 ${d.target_minutes} 分钟`,
    },
  };
  let lang = localStorage.getItem('p2g_lang') || ((navigator.language || '').toLowerCase().startsWith('zh') ? 'zh' : 'en');
  if (!T[lang]) lang = 'en';
  let L = T[lang];

  const $ = id => document.getElementById(id);

  function applyLang(next) {
    lang = T[next] ? next : 'en'; L = T[lang]; localStorage.setItem('p2g_lang', lang);
    document.documentElement.lang = lang === 'zh' ? 'zh' : 'en';
    document.querySelectorAll('[data-i18n]').forEach(el => { const v = L[el.dataset.i18n]; if (typeof v === 'string') el.textContent = v; });
    document.querySelectorAll('[data-ph]').forEach(el => { const v = L[el.dataset.ph]; if (typeof v === 'string') el.placeholder = v; });
    document.querySelectorAll('.m-btn').forEach(b => b.textContent = `${b.dataset.m} ${L.unit}`);
    document.querySelectorAll('.lang-btn').forEach(b => {
      const on = b.dataset.lang === lang;
      b.classList.toggle('bg-sgreen', on); b.classList.toggle('text-black', on); b.classList.toggle('text-muted', !on);
    });
  }
  document.querySelectorAll('.lang-btn').forEach(b => b.onclick = () => applyLang(b.dataset.lang));

  // ===================== styling shortcuts =====================
  document.querySelectorAll('.m-btn').forEach(b => b.className =
    'm-btn rounded-full bg-surf2 py-2.5 text-sm font-semibold hover:bg-field transition');
  document.querySelectorAll('.adv-input').forEach(i => i.classList.add(
    'w-full','rounded-lg','bg-field/60','px-3','py-2','text-sm','placeholder-muted','focus:outline-none','focus:ring-2','focus:ring-white'));
  document.querySelectorAll('.setlbl').forEach(l => l.classList.add('block','text-xs','text-muted','mb-1'));

  // ===================== minute selector =====================
  let minutes = 5;
  function paintMinutes(){ document.querySelectorAll('.m-btn').forEach(b => {
    const on = +b.dataset.m === minutes;
    b.classList.toggle('!bg-sgreen', on); b.classList.toggle('!text-black', on);
  }); }
  document.querySelectorAll('.m-btn').forEach(b => b.onclick = () => { minutes = +b.dataset.m; paintMinutes(); });

  // ===================== BYOK settings =====================
  const SET_FIELDS = {
    s_llm_base:'llm_base_url', s_llm_key:'llm_api_key', s_llm_model:'llm_model',
  };
  function saveSettings(){
    const data = {}; Object.keys(SET_FIELDS).forEach(id => data[id] = $(id).value);
    localStorage.setItem('p2g_settings', JSON.stringify(data));
  }
  function loadSettings(){
    let data = {}; try { data = JSON.parse(localStorage.getItem('p2g_settings')||'{}'); } catch(e){}
    Object.keys(SET_FIELDS).forEach(id => { if (data[id] != null) $(id).value = data[id]; });
  }
  Object.keys(SET_FIELDS).forEach(id => $(id).addEventListener('change', saveSettings));
  function settingsPayload(){
    const p = {}; Object.entries(SET_FIELDS).forEach(([id,key]) => { const v=$(id).value.trim(); if (v) p[key]=v; });
    return p;
  }

  // ===================== screens =====================
  function show(name){ ['input','progress','player'].forEach(s =>
    $('screen-'+s).classList.toggle('hidden', s !== name)); }
  function reset(){ if (window._es) window._es.close(); $('audio').pause(); show('input'); }

  function renderSteps(states){
    $('steps').innerHTML = Object.keys(L.steps).map(k => {
      const st = states[k] || {status:'pending'};
      const icon = st.status==='done' ? '✓' : st.status==='running' ? '◌' : '○';
      const color = st.status==='done' ? 'text-sgreen' : st.status==='running' ? 'text-sgreenL animate-pulse' : 'text-gray-600';
      return `<li class="flex items-start gap-3">
        <span class="step-dot ${color} text-lg leading-none mt-0.5">${icon}</span>
        <div><div class="text-sm ${st.status==='pending'?'text-gray-600':'text-white'}">${L.steps[k]}</div>
        ${st.detail?`<div class="text-xs text-muted">${st.detail}</div>`:''}</div></li>`;
    }).join('');
  }

  $('go').onclick = async () => {
    const url = $('url').value.trim();
    $('input-err').classList.add('hidden');
    if (!/^https?:\/\//.test(url)) { $('input-err').textContent=L.err_url; $('input-err').classList.remove('hidden'); return; }
    const body = { url, minutes, focus:$('focus').value, deep_topics:$('deep').value, prefs:$('prefs').value, language:$('lang').value, ...settingsPayload() };
    let res;
    try { res = await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json()); }
    catch(e){ $('input-err').textContent=L.err_req+e; $('input-err').classList.remove('hidden'); return; }

    const states = {}; renderSteps(states); show('progress'); $('prog-err').classList.add('hidden');
    const es = new EventSource('/api/events/'+res.job_id); window._es = es;
    es.onmessage = async (m) => {
      const ev = JSON.parse(m.data);
      if (ev.step === '__done__'){
        es.close();
        if (ev.status === 'error'){ $('prog-err').textContent = L.err_done+ev.detail; $('prog-err').classList.remove('hidden'); return; }
        const data = await fetch('/api/result/'+res.job_id).then(r=>r.json());
        renderPlayer(data);
        return;
      }
      states[ev.step] = {status:ev.status, detail:ev.detail};
      renderSteps(states);
    };
    es.onerror = () => { $('prog-err').textContent=L.err_conn; $('prog-err').classList.remove('hidden'); };
  };

  function renderPlayer(d){
    $('p-title').textContent = d.title;
    $('p-meta').textContent = L.meta(d);
    const audio = $('audio'); audio.src = d.audio_url;
    $('download').href = d.audio_url;

    $('chapters').innerHTML = (d.chapters||[]).map(c =>
      `<button class="w-full text-left text-sm px-3 py-2.5 rounded-lg bg-surf hover:bg-surf2 transition" onclick="document.getElementById('audio').currentTime=${c.start};document.getElementById('audio').play()">
        <span class="text-sgreen tabular-nums mr-2 font-semibold">${fmt(c.start)}</span>${c.title}</button>`).join('');

    $('points').innerHTML = (d.key_points||[]).map(p =>
      `<div class="rounded-lg bg-surf px-3 py-2.5 text-sm">
        <span class="text-sgreen mr-1">●</span>${p.point}
        ${p.detail?`<div class="text-xs text-muted mt-0.5">${p.detail}</div>`:''}</div>`).join('');

    const srcRows = [];
    (d.research||[]).forEach(r => (r.sources||[]).forEach(s =>
      srcRows.push(`<a href="${s.url}" target="_blank" class="block text-sm text-sgreen truncate hover:underline">${s.title||s.url}</a>`)));
    $('sources').innerHTML = srcRows.length ? srcRows.join('') : `<p class="text-xs text-muted">${L.none}</p>`;

    $('script').textContent = d.script;

    setupMediaSession(d, audio);
    show('player');
  }

  function fmt(s){ s=Math.round(s); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

  // ---- background playback: Media Session API (lock screen / control center) ----
  function setupMediaSession(d, audio){
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({ title: d.title, artist: 'podcast2go', album: 'podcast2go' });
    navigator.mediaSession.setActionHandler('play', () => audio.play());
    navigator.mediaSession.setActionHandler('pause', () => audio.pause());
    navigator.mediaSession.setActionHandler('seekbackward', () => audio.currentTime = Math.max(0, audio.currentTime - 15));
    navigator.mediaSession.setActionHandler('seekforward', () => audio.currentTime = Math.min(audio.duration, audio.currentTime + 15));
  }

  // ===================== init =====================
  loadSettings();
  applyLang(lang);
  paintMinutes();
</script>
</body>
</html>
