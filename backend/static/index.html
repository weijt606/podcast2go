<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>podcast2go</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0b0f1a" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background:#0b0f1a; color:#e5e7eb; -webkit-tap-highlight-color:transparent; }
    .step-dot { transition: all .3s; }
  </style>
</head>
<body class="min-h-screen">
<div class="max-w-md mx-auto px-5 pt-8 pb-28">

  <header class="mb-6">
    <h1 class="text-2xl font-bold">🎧 podcast2go</h1>
    <p class="text-sm text-gray-400 mt-1">长内容 → 时长可控的重点播客，边走边听</p>
  </header>

  <!-- ===== BYOK SETTINGS ===== -->
  <details id="settings" class="mb-5 rounded-xl bg-gray-800/40 border border-gray-700 p-3">
    <summary class="text-sm text-gray-200 cursor-pointer select-none">⚙️ 引擎设置 · BYOK（仅存本地浏览器）</summary>
    <div class="mt-3 space-y-3">
      <div>
        <label class="setlbl">LLM Base URL</label>
        <input id="s_llm_base" class="adv-input" placeholder="https://api.studio.nebius.ai/v1（或本地 http://localhost:11434/v1）" />
      </div>
      <div>
        <label class="setlbl">LLM API Key</label>
        <input id="s_llm_key" type="password" class="adv-input" placeholder="sk-…（本地 Ollama 可填 ollama）" />
      </div>
      <div>
        <label class="setlbl">LLM Model</label>
        <input id="s_llm_model" class="adv-input" placeholder="deepseek-ai/DeepSeek-V3" />
      </div>
      <div class="grid grid-cols-3 gap-2">
        <div><label class="setlbl">TTS</label>
          <select id="s_tts" class="adv-input"><option value="edge">edge</option><option value="gradium">gradium</option></select></div>
        <div><label class="setlbl">搜索</label>
          <select id="s_search" class="adv-input"><option value="duckduckgo">ddg</option><option value="tavily">tavily</option></select></div>
        <div><label class="setlbl">抽取</label>
          <select id="s_extract" class="adv-input"><option value="trafilatura">trafil</option><option value="tavily">tavily</option></select></div>
      </div>
      <div id="row_gradium" class="hidden"><label class="setlbl">Gradium API Key</label><input id="s_gradium" type="password" class="adv-input" /></div>
      <div id="row_tavily" class="hidden"><label class="setlbl">Tavily API Key</label><input id="s_tavily" type="password" class="adv-input" /></div>
      <p class="text-xs text-gray-500">留空则用服务器 .env 默认值。Key 仅存于本浏览器 localStorage，随请求发往你的后端。</p>
    </div>
  </details>

  <!-- ===== 1. INPUT ===== -->
  <section id="screen-input">
    <label class="block text-sm text-gray-300 mb-1">链接（文章 / YouTube）</label>
    <input id="url" type="url" inputmode="url" placeholder="https://…"
      class="w-full rounded-xl bg-gray-800/70 border border-gray-700 px-4 py-3 text-sm focus:outline-none focus:border-indigo-500" />

    <label class="block text-sm text-gray-300 mt-5 mb-2">目标时长</label>
    <div id="minutes" class="grid grid-cols-4 gap-2">
      <button data-m="3" class="m-btn">3 分</button>
      <button data-m="5" class="m-btn">5 分</button>
      <button data-m="10" class="m-btn">10 分</button>
      <button data-m="15" class="m-btn">15 分</button>
    </div>

    <details class="mt-5 group">
      <summary class="text-sm text-indigo-400 cursor-pointer select-none">高级选项 ▾</summary>
      <div class="mt-3 space-y-3">
        <div>
          <label class="block text-xs text-gray-400 mb-1">核心点（聚焦哪些主题）</label>
          <input id="focus" class="adv-input" placeholder="例: 商业模式, 团队管理" />
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">深度了解的点（Tavily 深挖，逗号分隔）</label>
          <input id="deep" class="adv-input" placeholder="例: 监管风险" />
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">偏好（语气 / 视角）</label>
          <input id="prefs" class="adv-input" placeholder="例: 对初学者友好，只讲结论" />
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">输出语言（取决于 TTS 引擎；默认 edge 引擎支持中文）</label>
          <select id="lang" class="adv-input">
            <option>English</option><option>中文</option><option>Japanese</option>
            <option>French</option><option>German</option>
            <option>Spanish</option><option>Portuguese</option>
          </select>
        </div>
      </div>
    </details>

    <button id="go" class="mt-6 w-full rounded-xl bg-indigo-600 hover:bg-indigo-500 py-3.5 font-semibold disabled:opacity-40">
      生成播客
    </button>
    <p id="input-err" class="text-rose-400 text-sm mt-3 hidden"></p>
  </section>

  <!-- ===== 2. PROGRESS ===== -->
  <section id="screen-progress" class="hidden">
    <h2 class="text-lg font-semibold mb-4">正在生成…</h2>
    <ul id="steps" class="space-y-3"></ul>
    <p id="prog-err" class="text-rose-400 text-sm mt-4 hidden"></p>
    <button onclick="reset()" class="mt-6 text-sm text-gray-400 underline">取消 / 重新开始</button>
  </section>

  <!-- ===== 3. PLAYER ===== -->
  <section id="screen-player" class="hidden">
    <h2 id="p-title" class="text-lg font-bold leading-snug"></h2>
    <p id="p-meta" class="text-xs text-gray-400 mt-1 mb-4"></p>

    <audio id="audio" controls preload="auto" class="w-full mb-5"></audio>

    <div id="chapters" class="space-y-1 mb-5"></div>

    <h3 class="text-sm font-semibold text-gray-300 mb-2">核心重点</h3>
    <div id="points" class="space-y-2 mb-5"></div>

    <h3 class="text-sm font-semibold text-gray-300 mb-2">来源 & 深度补充</h3>
    <div id="sources" class="space-y-2 mb-5"></div>

    <details class="mb-5">
      <summary class="text-sm text-indigo-400 cursor-pointer">查看完整脚本 ▾</summary>
      <p id="script" class="text-sm text-gray-300 mt-2 whitespace-pre-wrap leading-relaxed"></p>
    </details>

    <div class="flex gap-3">
      <a id="download" download class="flex-1 text-center rounded-xl bg-gray-800 py-3 text-sm">下载音频</a>
      <button onclick="reset()" class="flex-1 rounded-xl bg-indigo-600 py-3 text-sm font-semibold">再来一个</button>
    </div>
  </section>
</div>

<script>
  // tailwind utility shortcuts via class injection
  const style = document.createElement('style');
  document.head.appendChild(style);
  document.querySelectorAll('.m-btn').forEach(b => b.className =
    'm-btn rounded-xl bg-gray-800/70 border border-gray-700 py-2.5 text-sm');
  document.querySelectorAll('.adv-input').forEach(i => i.classList.add(
    'w-full','rounded-lg','bg-gray-800/70','border','border-gray-700','px-3','py-2','text-sm','focus:outline-none','focus:border-indigo-500'));
  document.querySelectorAll('.setlbl').forEach(l => l.classList.add('block','text-xs','text-gray-400','mb-1'));

  let minutes = 5;
  const $ = id => document.getElementById(id);
  function show(name){ ['input','progress','player'].forEach(s =>
    $('screen-'+s).classList.toggle('hidden', s !== name)); }
  function reset(){ if (window._es) window._es.close(); $('audio').pause(); show('input'); }

  // minute selector
  function paintMinutes(){ document.querySelectorAll('.m-btn').forEach(b =>
    b.classList.toggle('!border-indigo-500', +b.dataset.m === minutes) ); }
  document.querySelectorAll('.m-btn').forEach(b => b.onclick = () => { minutes = +b.dataset.m; paintMinutes(); });
  paintMinutes();

  // ---- BYOK settings: persist to localStorage, merge into each request ----
  const SET_FIELDS = {
    s_llm_base:'llm_base_url', s_llm_key:'llm_api_key', s_llm_model:'llm_model',
    s_tts:'tts_provider', s_search:'search_provider', s_extract:'extract_provider',
    s_gradium:'gradium_api_key', s_tavily:'tavily_api_key',
  };
  function toggleKeyRows(){
    $('row_gradium').classList.toggle('hidden', $('s_tts').value !== 'gradium');
    $('row_tavily').classList.toggle('hidden', !($('s_search').value === 'tavily' || $('s_extract').value === 'tavily'));
  }
  function saveSettings(){
    const data = {}; Object.keys(SET_FIELDS).forEach(id => data[id] = $(id).value);
    localStorage.setItem('p2g_settings', JSON.stringify(data)); toggleKeyRows();
  }
  function loadSettings(){
    let data = {}; try { data = JSON.parse(localStorage.getItem('p2g_settings')||'{}'); } catch(e){}
    Object.keys(SET_FIELDS).forEach(id => { if (data[id] != null) $(id).value = data[id]; });
    toggleKeyRows();
  }
  Object.keys(SET_FIELDS).forEach(id => $(id).addEventListener('change', saveSettings));
  loadSettings();
  function settingsPayload(){
    const p = {}; Object.entries(SET_FIELDS).forEach(([id,key]) => { const v=$(id).value.trim(); if (v) p[key]=v; });
    return p;
  }

  const STEP_LABELS = {ingest:'解析来源 & 转写', extract:'提取核心重点', research:'Tavily 深度搜索', script:'撰写播客脚本', tts:'Gradium 语音合成'};
  function renderSteps(states){
    $('steps').innerHTML = Object.keys(STEP_LABELS).map(k => {
      const st = states[k] || {status:'pending'};
      const icon = st.status==='done' ? '✓' : st.status==='running' ? '◌' : '○';
      const color = st.status==='done' ? 'text-emerald-400' : st.status==='running' ? 'text-indigo-400 animate-pulse' : 'text-gray-600';
      return `<li class="flex items-start gap-3">
        <span class="step-dot ${color} text-lg leading-none mt-0.5">${icon}</span>
        <div><div class="text-sm ${st.status==='pending'?'text-gray-500':'text-gray-100'}">${STEP_LABELS[k]}</div>
        ${st.detail?`<div class="text-xs text-gray-500">${st.detail}</div>`:''}</div></li>`;
    }).join('');
  }

  $('go').onclick = async () => {
    const url = $('url').value.trim();
    $('input-err').classList.add('hidden');
    if (!/^https?:\/\//.test(url)) { $('input-err').textContent='请输入有效链接'; $('input-err').classList.remove('hidden'); return; }
    const body = { url, minutes, focus:$('focus').value, deep_topics:$('deep').value, prefs:$('prefs').value, language:$('lang').value, ...settingsPayload() };
    let res;
    try { res = await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json()); }
    catch(e){ $('input-err').textContent='请求失败: '+e; $('input-err').classList.remove('hidden'); return; }

    const states = {}; renderSteps(states); show('progress'); $('prog-err').classList.add('hidden');
    const es = new EventSource('/api/events/'+res.job_id); window._es = es;
    es.onmessage = async (m) => {
      const ev = JSON.parse(m.data);
      if (ev.step === '__done__'){
        es.close();
        if (ev.status === 'error'){ $('prog-err').textContent = '生成失败: '+ev.detail; $('prog-err').classList.remove('hidden'); return; }
        const data = await fetch('/api/result/'+res.job_id).then(r=>r.json());
        renderPlayer(data);
        return;
      }
      states[ev.step] = {status:ev.status, detail:ev.detail};
      renderSteps(states);
    };
    es.onerror = () => { $('prog-err').textContent='连接中断'; $('prog-err').classList.remove('hidden'); };
  };

  function renderPlayer(d){
    $('p-title').textContent = d.title;
    $('p-meta').textContent = `实际 ${Math.round(d.duration)} 秒 · 目标 ${d.target_minutes} 分钟`;
    const audio = $('audio'); audio.src = d.audio_url;
    $('download').href = d.audio_url;

    $('chapters').innerHTML = (d.chapters||[]).map(c =>
      `<button class="w-full text-left text-sm px-3 py-2 rounded-lg bg-gray-800/50 hover:bg-gray-800" onclick="document.getElementById('audio').currentTime=${c.start};document.getElementById('audio').play()">
        <span class="text-gray-500 tabular-nums mr-2">${fmt(c.start)}</span>${c.title}</button>`).join('');

    $('points').innerHTML = (d.key_points||[]).map(p =>
      `<div class="rounded-lg bg-gray-800/50 px-3 py-2 text-sm">
        <span class="text-indigo-400 mr-1">●</span>${p.point}
        ${p.detail?`<div class="text-xs text-gray-400 mt-0.5">${p.detail}</div>`:''}</div>`).join('');

    const srcRows = [];
    (d.research||[]).forEach(r => (r.sources||[]).forEach(s =>
      srcRows.push(`<a href="${s.url}" target="_blank" class="block text-sm text-indigo-300 truncate underline">${s.title||s.url}</a>`)));
    $('sources').innerHTML = srcRows.length ? srcRows.join('') : '<p class="text-xs text-gray-500">无</p>';

    $('script').textContent = d.script;

    setupMediaSession(d, audio);
    show('player');
  }

  function fmt(s){ s=Math.round(s); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

  // ---- background playback: Media Session API (lock screen / control center) ----
  function setupMediaSession(d, audio){
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({
      title: d.title, artist: 'podcast2go', album: '重点播客',
    });
    navigator.mediaSession.setActionHandler('play', () => audio.play());
    navigator.mediaSession.setActionHandler('pause', () => audio.pause());
    navigator.mediaSession.setActionHandler('seekbackward', () => audio.currentTime = Math.max(0, audio.currentTime - 15));
    navigator.mediaSession.setActionHandler('seekforward', () => audio.currentTime = Math.min(audio.duration, audio.currentTime + 15));
  }
</script>
</body>
</html>
